    /* Each square should be 100px by 100px */
    /* My colours for white: #f0d9b5, black: #b58863 */
    * {
      margin: 0;
      padding: 0;

    body {
      height: 100vh;
      display: grid;
      place-content: center;
    }
    
    .container {
      display: grid;
      width: 800px;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
    }

    div > div {
      height: 100px;
      width: 100px;

    .black {
